version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: foodordering_postgres
    environment:
      POSTGRES_DB: foodordering
      POSTGRES_USER: foodordering_user
      POSTGRES_PASSWORD: foodordering_pass
    ports:
      - "5432:5432"
    volumes:
      - foodordering_pgdata:/var/lib/postgresql/data

volumes:
  foodordering_pgdata:
